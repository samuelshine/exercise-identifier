# Alembic configuration for the Exercise Identifier API.
#
# The database URL is NOT set here on purpose — env.py reads it from
# app.core.config.get_settings() so that local dev, CI, and production
# all use the same source of truth.
#
# Run from the backend/ directory:
#   alembic upgrade head            # apply all migrations
#   alembic revision --autogenerate -m "add foo column"
#   alembic downgrade -1            # roll back one revision

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
